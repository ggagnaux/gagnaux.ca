<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>gagnaux.ca</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/js/theme.js"></script>
  <script src="/js/site-config.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a id="site-title" class="brand" href="/">
        <img id="brand-image" class="brand-image" src="/img/greg.jpg" alt="Greg Gagnaux" />
        <span id="brand-title" class="brand-title">Greg Gagnaux</span>
      </a>
      <nav class="top-menu">
        <button type="button" data-href="/">Home</button>
        <button type="button" data-href="/blog.html">Blog</button>
        <button type="button" data-href="/admin.html">Admin</button>
      </nav>
      <div class="theme-control">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h1>Home</h1>
      <p id="site-tagline">Work highlights, writing, and links.</p>
    </section>

    <section class="card">
      <h2>About</h2>
      <p id="about-text">This is a minimal personal site for sharing projects, notes, and links.</p>
    </section>

    <section class="card">
      <h2>Projects</h2>
      <ul id="highlights-list"></ul>
    </section>

    <section class="card">
      <h2>Other Sites</h2>
      <ul id="links-list"></ul>
    </section>
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">Copyright © 2026 Greg Gagnaux. All rights reserved.</div>
  </footer>
  <script type="module" src="/js/home.js"></script>
</body>
</html>
