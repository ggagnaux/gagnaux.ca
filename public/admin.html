<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin | gagnaux.ca</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/js/theme.js"></script>
  <script src="/js/site-config.js"></script>
  <script src="/js/nav.js"></script>
</head>
<body>
  <header class="top-nav">
    <div class="top-nav-inner">
      <a id="site-title" class="brand" href="/">
        <img id="brand-image" class="brand-image" src="/img/greg.jpg" alt="Greg Gagnaux" />
        <span id="brand-title" class="brand-title">Greg Gagnaux</span>
      </a>
      <nav class="top-menu">
        <button type="button" data-href="/">Home</button>
        <button type="button" data-href="/blog.html">Blog</button>
        <button type="button" data-href="/admin.html" aria-current="page">Admin</button>
      </nav>
      <div class="theme-control">
        <select id="theme-select" aria-label="Theme">
          <option value="system">System</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
    </div>
  </header>

  <main class="container admin-layout">
    <header class="page-header admin-page-header">
      <h1>Admin</h1>
      <button id="logout-btn" type="button" class="ghost inline-button hidden">Log out</button>
    </header>

    <section id="login-section" class="card narrow">
      <h2>Sign In</h2>
      <form id="login-form">
        <label>Username<input name="username" required /></label>
        <label>Password<input type="password" name="password" required /></label>
        <button type="submit">Sign in</button>
      </form>
      <p id="login-error" class="error"></p>
    </section>

    <section id="dashboard" class="hidden">
      <nav class="admin-tabs" aria-label="Admin sections">
        <button id="tab-blog-btn" class="admin-tab-btn" type="button" aria-selected="true">Blog</button>
        <button id="tab-config-btn" class="admin-tab-btn" type="button" aria-selected="false">Site Config</button>
      </nav>

      <section id="tab-blog-panel">
        <section class="card admin-card-new-post">
          <form id="post-form" class="stack">
            <div class="admin-card-head">
              <h3 id="form-title">New Post</h3>
              <label class="checkbox post-draft-toggle"><input type="checkbox" name="draft" checked /> Draft</label>
            </div>
            <input type="hidden" name="originalSlug" />
            <label>Title<input name="title" required /></label>
            <label>Slug<input name="slug" placeholder="auto-generated if blank" /></label>
            <label>Date<input type="date" name="date" required /></label>
            <label>Summary<textarea name="summary" rows="2"></textarea></label>
            <label>Tags (comma-separated)<input name="tags" placeholder="javascript, notes" /></label>
            <label>Cover image URL<input name="coverImage" placeholder="/uploads/your-image.jpg" /></label>
            <label>Content (Markdown)<textarea name="content" rows="14" required></textarea></label>

            <div class="upload-row">
              <input id="image-input" type="file" accept="image/*" />
              <button type="button" id="upload-btn">Upload image</button>
            </div>

            <div class="actions">
              <button type="submit">Save post</button>
              <button id="reset-btn" type="button" class="ghost">Reset</button>
            </div>
            <p id="form-status" class="small"></p>
          </form>
        </section>

        <section class="card admin-card-all-posts">
          <h3>All Posts</h3>
          <div id="posts-list" class="stack"></div>
        </section>
      </section>

      <section id="tab-config-panel" class="hidden">
        <section class="card admin-card-config">
          <h3>Site Config</h3>

          <form id="site-config-form" class="stack">
            <label>Site Title<input id="cfg-site-title" name="siteTitle" required /></label>
            <label>Brand Image URL<input id="cfg-brand-image" name="brandImage" placeholder="/img/greg.jpg" /></label>
            <label>Brand Image Alt<input id="cfg-brand-image-alt" name="brandImageAlt" /></label>
            <label>About<textarea id="cfg-about" name="about" rows="4"></textarea></label>
            <label>Highlights (one per line)<textarea id="cfg-highlights" name="highlights" rows="5"></textarea></label>

            <div class="config-collection config-collection-projects">
              <div class="config-collection-head">
                <h4>Projects</h4>
                <div class="config-collection-actions">
                  <button id="add-project-btn" type="button" class="ghost inline-button">Add Project</button>
                  <button id="toggle-projects-btn" type="button" class="ghost inline-button collection-toggle-btn" aria-expanded="true" aria-controls="projects-collection-body" aria-label="Collapse Projects" title="Collapse Projects">&#9652;</button>
                </div>
              </div>
              <div id="projects-collection-body">
                <div class="projects-table-wrap">
                  <table class="projects-table">
                    <thead>
                      <tr>
                        <th class="reorder-col"></th>
                        <th class="checkbox-col"></th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>URL</th>
                      </tr>
                    </thead>
                    <tbody id="projects-editor"></tbody>
                  </table>
                </div>
                <div class="config-remove-actions">
                  <button id="remove-projects-btn" type="button" class="ghost inline-button danger-button hidden" disabled>Remove</button>
                </div>
              </div>
            </div>

            <div class="config-collection config-collection-links">
              <div class="config-collection-head">
                <h4>Links</h4>
                <div class="config-collection-actions">
                  <button id="add-link-btn" type="button" class="ghost inline-button">Add Link</button>
                  <button id="toggle-links-btn" type="button" class="ghost inline-button collection-toggle-btn" aria-expanded="true" aria-controls="links-collection-body" aria-label="Collapse Links" title="Collapse Links">&#9652;</button>
                </div>
              </div>
              <div id="links-collection-body">
                <div class="links-table-wrap">
                  <table class="links-table">
                    <thead>
                      <tr>
                        <th class="reorder-col"></th>
                        <th class="checkbox-col"></th>
                        <th>Label</th>
                        <th>URL</th>
                      </tr>
                    </thead>
                    <tbody id="links-editor"></tbody>
                  </table>
                </div>
                <div class="config-remove-actions">
                  <button id="remove-links-btn" type="button" class="ghost inline-button danger-button hidden" disabled>Remove</button>
                </div>
              </div>
            </div>

            <div class="actions">
              <button id="save-config-btn" type="submit">Save config</button>
              <button id="reset-config-btn" type="button" class="ghost">Reset Form</button>
            </div>
          </form>
          <p id="config-status" class="small"></p>
        </section>
      </section>
    </section>
  </main>
  <footer class="site-footer">
    <div class="site-footer-inner">Copyright © 2026 Greg Gagnaux. All rights reserved.</div>
  </footer>

  <div id="confirm-overlay" class="confirm-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-message">
    <div class="confirm-dialog">
      <h3 id="confirm-title">Confirm Action</h3>
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button id="confirm-cancel-btn" type="button" class="ghost inline-button">Cancel</button>
        <button id="confirm-ok-btn" type="button" class="danger-button inline-button">Confirm</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/admin.js"></script>
</body>
</html>
